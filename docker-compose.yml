# Hạ tầng local cho phát triển.
# CSDL PostgreSQL dùng Supabase (cloud) — ở đây chỉ chạy Redis cho BullMQ (P2+).
services:
  redis:
    image: redis:7-alpine
    container_name: ai_campaign_redis
    # Map ra 6381 để tránh xung đột với Redis native cũ (6379) và project khác (6380).
    ports:
      - "6381:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  redis_data:
